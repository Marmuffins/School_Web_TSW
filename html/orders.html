<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Pizzeria Mamarina</title>
    <link rel="stylesheet" href="../css/orders.css" />
    <link rel="stylesheet" href="../css/fontello.css" />
  </head>
  <body>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Bungee&display=swap"
      rel="stylesheet"
    />

    <nav>
      <a href="Pizzeria Mamarina.html">
        <img
          src="../assets/images/Logo_pizzeria-removebg-preview.png"
          height="125px"
          width="200px"
        />
      </a>

      <!-- pouze visual -->

      <form class="vyhledávání" id="vyhledávání">
        <span>🔍</span>
        <input type="text" placeholder="Search" />
      </form>

      <!-- pouze visual -->

      <a href="orders.html">Orders</a>
      <a href="menu.html">Menu</a>
      <a href="about.html">About us</a>
      <a href="contact.html">Contact-us</a>
      <a href="shopping-cart.html" style="font-size: 2.5rem"
        ><i class="icon-basket"></i
      ></a>
    </nav>

    <div class="video_background">
      <video autoplay loop muted playsinline>
        <source src="../assets/videos/vid_for_web.mov" type="video/mp4" />
      </video>
      <div class="darkening_video"></div>
    </div>

    <div class="text_na_stredu">ORDER AVERAGE PIZZA</div>
    <div class="dark" id="dark"></div>

    <div class="pozadi" id="open">
      <button id="close-button" onclick="Close()">✖</button>

      <div class="dropdown">
        <select class="button-pizza" id="pizza-type">
          <option value="">-- Choose pizza --</option>
          <option value="margherita">Margherita</option>
          <option value="pepperoni">Pepperoni</option>
          <option value="bbqchicken">BBQ Chicken</option>
          <option value="quattro formaggi">Quattro formaggi</option>
          <option value="seafood">Seafood</option>
        </select>

        <select class="button-pizza" id="pizza-size">
          <option value="">-- Choose size --</option>
          <option value="large">Large</option>
          <option value="medium">Medium</option>
          <option value="small">Small</option>
        </select>

        <img id="pizza-image" src="" width="125%" height="550%" />
      </div>
      <div class="describe">
        <p id="pizza-description"></p>
        <p id="pizza-price"></p>
        <p id="pizza-diameter"></p>
      </div>
      <button class="btn" id="btn-confirm-purch" onclick="Close()">
        ORDER
      </button>
    </div>

    <button class="btn-main" onclick="Open()">ORDER HERE</button>

    <script src="../js/orders.js"></script>
  </body>
</html>
