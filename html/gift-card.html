          src="../assets/images/Logo_pizzeria-removebg-preview.png"

    <div class="container">
      <h1>GIFT CARD</h1>

      <h4>Give the gift of delicious pizza!</h4>

      <fieldset id="choose-amount">

        <!-- uživatel může zvolit částku, kterou chce darovat -->

        <legend>Choose amount</legend>
          <button autofocus>$50</button>
          <button>$100</button>
          <button>$250</button>
      </fieldset>

      <fieldset id="enter-details">

         <!-- uživatel zadá jméno a email příjemce, aby mohl být dárkový poukaz doručen elektronicky -->
         
        <legend>Enter details</legend>
        <label>Name:</label>
        <input type="text"  required placeholder="Example"/>
        <label>Email:</label>
        <input type="email"  required placeholder="Email-address"/>
      </fieldset>

      <fieldset id="confirmation">

        <legend>Confirmation</legend> 
        <p>$50 gift card to Example at Email-address</p>

        <!-- Tady budou informace co uživatel zadá do předchozích fieldsetů, aby mohl potvrdit, že jsou správné a pokračovat v procesu objednávky
          zatím je to jen vizual -->

        <button>Confirm</button>

          <!-- Po kliknutí na tlačítko "Confirm" se zobrazí potvrzovací zpráva a shrnutí objednávky a zadání dodatečných údajů pro zpracování objednávky.
          Tato část bude v budoucnu, ale prozatím se jedná pouze o vizuál bez funkčnosti -->

      </fieldset>
  
    </div>
  
</body>
